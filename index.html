<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Amelia & Dad</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <a-assets>
        <!-- Canvas textures generated at runtime via beam-texture component -->
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <!-- ============================================================
             DAD'S BEAM  — warm cool white, right headstone
             xFrac=0.72 → AR x = +0.22
             baseYFrac=0.64 → AR y_base = -0.187  (aspect 1.333)
             beam height = 0.73
             ============================================================ -->
        <a-entity position="0.22 -0.187 0.001" beam-source="
          height: 0.73;
          width: 0.19;
          color1: 235,245,255;
          color2: 200,220,255;
          color3: 170,200,255;
          dustColor: 210,230,255;
          phase: 0;
          numRays: 7;
          spreadTop: 0.85;
        "></a-entity>

        <!-- ============================================================
             AMELIA'S BEAM — soft cool white, black headstone
             xFrac=0.23 → AR x = -0.27
             baseYFrac=0.60 → AR y_base = -0.133
             beam height = 0.56  (narrower — 15% slimmer)
             ============================================================ -->
        <a-entity position="-0.27 -0.133 0.001" beam-source="
          height: 0.56;
          width: 0.135;
          color1: 235,245,255;
          color2: 200,220,255;
          color3: 170,200,255;
          dustColor: 210,230,255;
          phase: 1.4;
          numRays: 7;
          spreadTop: 0.85;
        "></a-entity>

      </a-entity>

    </a-scene>

    <script>
    AFRAME.registerComponent('beam-source', {
      schema: {
        height:     { type: 'number', default: 0.7 },
        width:      { type: 'number', default: 0.18 },
        color1:     { type: 'string', default: '235,245,255' },
        color2:     { type: 'string', default: '200,220,255' },
        color3:     { type: 'string', default: '170,200,255' },
        dustColor:  { type: 'string', default: '210,230,255' },
        phase:      { type: 'number', default: 0 },
        numRays:    { type: 'number', default: 7 },
        spreadTop:  { type: 'number', default: 0.85 }
      },

      init: function () {
        const d = this.data;
        const el = this.el;
        this._phase = d.phase;
        this._startTime = null;
        this._planes = [];
        this._dustEls = [];

        // Ray config — offsets as fraction of beam width
        const rayConfigs = [
          { tdx: -0.55, dx: -0.48, wMult: 0.83, a: 0.50, c: d.color3 },
          { tdx: -0.30, dx: -0.25, wMult: 0.63, a: 0.68, c: d.color2 },
          { tdx: -0.10, dx:  0.00, wMult: 1.00, a: 0.82, c: d.color1 },
          { tdx:  0.14, dx:  0.20, wMult: 0.71, a: 0.63, c: d.color2 },
          { tdx:  0.38, dx:  0.44, wMult: 0.50, a: 0.44, c: d.color3 },
          { tdx: -0.45, dx: -0.35, wMult: 0.33, a: 0.32, c: d.color1 },
          { tdx:  0.28, dx:  0.31, wMult: 0.40, a: 0.38, c: d.color2 },
        ];

        const texSize = 256;

        rayConfigs.forEach((ray, i) => {
          // Build gradient canvas texture for this ray
          const canvas = document.createElement('canvas');
          canvas.width = texSize;
          canvas.height = texSize;
          const ctx = canvas.getContext('2d');

          // Vertical gradient (bright top, fade to transparent bottom... wait, beam goes UP)
          // In our setup, y=0 is the base (grave), y=height is top (sky)
          // So gradient should be: bright at bottom of plane (base), fade upward
          const vGrad = ctx.createLinearGradient(0, texSize, 0, 0);
          vGrad.addColorStop(0,    'rgba(' + ray.c + ', 0.92)');
          vGrad.addColorStop(0.18, 'rgba(' + ray.c + ', 0.78)');
          vGrad.addColorStop(0.55, 'rgba(' + ray.c + ', 0.42)');
          vGrad.addColorStop(0.85, 'rgba(' + ray.c + ', 0.16)');
          vGrad.addColorStop(1,    'rgba(' + ray.c + ', 0)');
          ctx.fillStyle = vGrad;
          ctx.fillRect(0, 0, texSize, texSize);

          // Horizontal mask — soft edges using destination-in
          const hGrad = ctx.createLinearGradient(0, 0, texSize, 0);
          hGrad.addColorStop(0,    'rgba(0,0,0,0)');
          hGrad.addColorStop(0.12, 'rgba(0,0,0,0.05)');
          hGrad.addColorStop(0.30, 'rgba(0,0,0,0.55)');
          hGrad.addColorStop(0.5,  'rgba(0,0,0,1)');
          hGrad.addColorStop(0.70, 'rgba(0,0,0,0.55)');
          hGrad.addColorStop(0.88, 'rgba(0,0,0,0.05)');
          hGrad.addColorStop(1,    'rgba(0,0,0,0)');
          ctx.globalCompositeOperation = 'destination-in';
          ctx.fillStyle = hGrad;
          ctx.fillRect(0, 0, texSize, texSize);

          // Create A-Frame texture
          const tex = new THREE.CanvasTexture(canvas);

          // Plane geometry
          const rayW = d.width * ray.wMult;
          const geom = new THREE.PlaneGeometry(rayW, d.height);
          const mat = new THREE.MeshBasicMaterial({
            map: tex,
            transparent: true,
            opacity: ray.a,
            depthWrite: false,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending
          });
          const mesh = new THREE.Mesh(geom, mat);

          // Position: base at y=0 going up, offset by ray dx (bottom) / tdx (top)
          // We approximate as centering the plane at halfway up
          const offsetX = (ray.dx * d.width * 0.5);
          mesh.position.set(offsetX, d.height / 2, 0);

          this._planes.push({ mesh, mat, baseOpacity: ray.a });
          el.object3D.add(mesh);
        });

        // Bloom at source top
        const bloomCanvas = document.createElement('canvas');
        bloomCanvas.width = 128; bloomCanvas.height = 128;
        const bctx = bloomCanvas.getContext('2d');
        const bGrad = bctx.createRadialGradient(64, 64, 0, 64, 64, 64);
        bGrad.addColorStop(0,   'rgba(' + d.color1 + ', 0.55)');
        bGrad.addColorStop(0.35,'rgba(' + d.color1 + ', 0.22)');
        bGrad.addColorStop(0.7, 'rgba(' + d.color1 + ', 0.06)');
        bGrad.addColorStop(1,   'rgba(' + d.color1 + ', 0)');
        bctx.fillStyle = bGrad;
        bctx.fillRect(0, 0, 128, 128);

        const bloomTex = new THREE.CanvasTexture(bloomCanvas);
        const bloomMat = new THREE.MeshBasicMaterial({
          map: bloomTex, transparent: true, opacity: 0.8,
          depthWrite: false, side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending
        });
        const bloomMesh = new THREE.Mesh(
          new THREE.PlaneGeometry(d.width * 1.1, d.width * 0.45),
          bloomMat
        );
        bloomMesh.position.set(0, d.height + 0.01, 0);
        this._bloomMesh = bloomMesh;
        this._bloomMat = bloomMat;
        el.object3D.add(bloomMesh);

        // Dust particles
        const dustCount = 40;
        for (let i = 0; i < dustCount; i++) {
          const dCanvas = document.createElement('canvas');
          dCanvas.width = 16; dCanvas.height = 16;
          const dc = dCanvas.getContext('2d');
          const dg = dc.createRadialGradient(8, 8, 0, 8, 8, 8);
          dg.addColorStop(0, 'rgba(' + d.dustColor + ',1)');
          dg.addColorStop(1, 'rgba(' + d.dustColor + ',0)');
          dc.fillStyle = dg; dc.fillRect(0, 0, 16, 16);

          const dTex = new THREE.CanvasTexture(dCanvas);
          const dMat = new THREE.MeshBasicMaterial({
            map: dTex, transparent: true,
            depthWrite: false, blending: THREE.AdditiveBlending
          });
          const dSize = Math.random() * 0.012 + 0.004;
          const dMesh = new THREE.Mesh(new THREE.PlaneGeometry(dSize, dSize), dMat);

          const progress = Math.random();
          const jitter = (Math.random() - 0.5) * d.width * 0.5;
          dMesh.position.set(jitter, progress * d.height, 0.001);

          this._dustEls.push({
            mesh: dMesh, mat: dMat,
            progress,
            speed: Math.random() * 0.00015 + 0.00008,
            jitter,
            baseAlpha: Math.random() * 0.7 + 0.3,
            delay: Math.random() * 3000
          });
          el.object3D.add(dMesh);
        }
      },

      tick: function (time) {
        if (!this._startTime) this._startTime = time;
        const t = time - this._startTime;
        const pulse = 0.88 + 0.12 * Math.sin(t * 0.0018 + this._phase);

        // Pulse ray planes
        this._planes.forEach((p, i) => {
          const rayPulse = pulse * (0.92 + 0.08 * Math.sin(t * 0.003 + this._phase + i));
          p.mat.opacity = p.baseOpacity * rayPulse;
        });

        // Pulse bloom
        this._bloomMat.opacity = 0.8 * pulse;

        // Animate dust
        this._dustEls.forEach(d => {
          const prog = ((d.progress + Math.max(0, t - d.delay) * d.speed) % 1 + 1) % 1;
          const height = this.data.height;
          let alpha;
          if (prog < 0.1) alpha = prog / 0.1;
          else if (prog > 0.75) alpha = 1 - (prog - 0.75) / 0.25;
          else alpha = 1;
          d.mat.opacity = alpha * d.baseAlpha * 0.85;
          d.mesh.position.set(d.jitter, prog * height, 0.001);
        });
      }
    });
    </script>
  </body>
</html>
